  <div class="layui-btn-container">
    <button class="layui-btn layui-btn-sm" lay-event="getCheckData">新增配置</button>

<script type="text/html" id="barDemo">
	<a class="layui-btn layui-btn-danger layui-btn-xs" lay-event="xiugai">修改</a>
	<!-- <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="del">删除</a> -->
</script>
<script type="text/javascript">
	
	$("#footer").load("public/footer.html");
	
	var table = layui.table;
	var laydate = layui.laydate;
	var form = layui.form;
	var formSelects = layui.formSelects;
	// //日期范围
	//   laydate.render({
	//     elem: '#chooseTime'
	//     ,range: true
	//   });
	
	// 渲染数据
	table.render({
	  elem: '#videodetail'
	   ,toolbar: '#toolbarDemo' //开启头部工具栏，并为其绑定左侧模板
	   ,defaultToolbar: []
	  ,page:true
	  ,url:baseUrl+"/video/queryAllXmConfig"
	  ,cols: [[
		   {type:'checkbox'}
		 ,{field: '', title: '序号',width:60,templet: function(d){ return (d.LAY_INDEX); },align:"center"}
		 ,{field:'dw', title: '单位名称',align:"left",width:150,
			 templet:function(d){ 
				 if(d.dw==0){return "指挥中心"}
				 else if(d.dw==1){return "派出所自建"}
				 else if(d.dw==2){return "交警大队" }
				 else if(d.dw==3){return "教育监控"}
				 else if(d.dw==4){ return "小区监控" }
				 else if(d.dw==5){ return "内部监控" }
				 else{ return "其他单位" }},
		  }
		 ,{field:'xmmc',  title: '显示名称',align:"left",width:150}
		,{field:'xmmcShow',  title: '包含项目',align:"left"}
		,{title:'操作', toolbar: '#barDemo',align:"center" ,width:80,}
	  ]]
	  ,id:"testReload"
	});
	

//头工具栏事件
  table.on('toolbar(demo)', function(obj){
	var checkStatus = table.checkStatus(obj.config.id);
    switch(obj.event){
      case 'getCheckData':
		layer.open({
			 type:1,
			 area:['800px','500px'],
			  title: '更改配置',
			  content: $("#addnew"),
			  shade: 0,
			  btn: ['提交', '取消']
			  ,btn1: function(index, layero){
				  var dw = $("#danwei").val();
				  var xmid = $("#xmName").val().toString();
				  var sort = $("#paixu").val();
				  var xmmc = $("#xmmc").val();
				  if(xmid==""||xmid==null||xmid==undefined){
					  layer.msg('项目名称不能为空！');
					  return
				  }
				  
				  var load1 = layer.load(1);  
					$.ajax({
					    url:baseUrl+"/video/addXmConfig",
					    type:"post",
					    cache:false,
						data:JSON.stringify(
							{
							  "dw":dw,
							  "xmid":xmid,
							  "xmmc":xmmc,
							  "sort":sort
							}
						),
						dataType : 'JSON',
						contentType: "application/json",
						beforeSend: function (XMLHttpRequest) {
						   XMLHttpRequest.setRequestHeader("token", token);
						},
					    success:function(data) {
							if(data.code==0){
								table.reload("testReload");
								layer.close(load1);
							    layer.msg("配置成功");
								$("#addnew").hide();
							}else {
								layer.close(load1);
							    layer.msg(data.msg);
								$("#addnew").hide();
							}
					    },
					    error : function (res) {
							layer.close(load1);
					        layer.msg('配置失败');
							$("#addnew").hide();
					    }
					})
					layer.closeAll();
					$("#addnew").hide();
			  },
			  btn2: function(index, layero){
					layer.closeAll();
					$("#addnew").hide();
			  },
			cancel: function(layero,index){ 
					layer.closeAll();
					$("#addnew").hide();
			  }
			});
      break;
	  case "delALL" :
		var data = checkStatus.data;
		if(data.length>0){
			$.ajax({
			    url:baseUrl + "/video/deleteXmConfig",
			    type:"POST",
			    cache:false,
				dataType : 'JSON',
				data:JSON.stringify(data),
				contentType: "application/json",
				beforeSend: function (XMLHttpRequest) {
				   XMLHttpRequest.setRequestHeader("token", token);
				},
			    success:function(data) {
					if(data.code==0){
					    layer.msg("删除成功");
						table.reload('testReload');
					}else {
					    layer.msg(data.msg);
					}
			    },
			    error : function (res) {
			        layer.msg('删除失败');
			    }
			})
		}else{
			layer.msg("您未选中任何数据!");
			return false
		}
	  break;
    };
  });

	
	// 动态添加select下拉,带搜索
	function layuiSelect(selectID,url,value){
		$.get(url,function(data){
			if(selectID.indexOf("#")!=0){
				selectID="#"+selectID;
			}
			$(selectID).empty();
			// console.log(data)
			for(var k of data.data){
				// console.log(k)
				$(selectID).append("<option value='"+k.V_XMId+"'>"+k.ProjectName+"</option>");
			}
			if(value!=undefined||value!=null||value!=""){
				$(selectID).val(value);
			}
			
			layui.form.render();
		})
	}
	// 调用该方法
	layuiSelect("xmName",baseUrl+"/video/queryAllXm");
	
	
	
	table.on('tool(demo)', function(obj){
	    var data = obj.data;
		console.log(data)
		// console.log(data.xmmcShow.split(","))
		// layui.form.render();
	    if(obj.event ==="xiugai"){
			var xmidArr = data.xmid.split(",");
			console.log(data.xmid)
			$("#danwei1").val(data.dw);
			$("#paixu1").val(data.sort);
			$("#xmmc1").val(data.xmmc);
			$.get(baseUrl+"/video/queryAllXm",function(res){
				$("#xmName1").empty();
				// console.log(data)
				// 展示以添加项目
				for(var k of res.data){
					$("#xmName1").append("<option value='"+k.V_XMId+"'>"+k.ProjectName+"</option>");
				}
				$('select[name="xmName1"]').val(xmidArr);
				layui.form.render();
			})
			// console.log(xmid1);
			layer.open({
			 type:1,
			 area:['800px','500px'],
			  title: '修改配置',
			  content: $("#xiugai"),
			  shade: 0,
			  btn: ['提交', '取消']
			  ,btn1: function(index, layero){
					var load1 = layer.load(1);  
					$.ajax({
					    url:baseUrl+"/video/updateXmConfig",
					    type:"post",
					    cache:false,
						data:JSON.stringify(
							{
							  "id":data.id,
							  "dw":$("#danwei1").val(),
							  "xmid":$("#xmName1").val().toString(),
							  "xmmc":$("#xmmc1").val(),
							  "sort":$("#paixu1").val()
							}
						),
						dataType : 'JSON',
						contentType: "application/json",
						beforeSend: function (XMLHttpRequest) {
						   XMLHttpRequest.setRequestHeader("token", token);
						},
					    success:function(data) {
							if(data.code==0){
								layer.close(load1);
							    layer.msg("修改成功");
								table.reload("testReload");
									$("#xiugai").hide();
							}else {
								layer.close(load1);
							    layer.msg(data.msg);
									$("#xiugai").hide();
							}
					    },
					    error : function (res) {
							layer.close(load1);
					        layer.msg('修改失败');
								$("#xiugai").hide();
					    }
					})
					layer.closeAll();
						$("#xiugai").hide();
			  },
			  btn2: function(index, layero){
					layer.closeAll();
						$("#xiugai").hide();
			  },
			cancel: function(layero,index){ 
					layer.closeAll();
						$("#xiugai").hide();
			  }
			});
		}
	  });
	
	
	
	
</script>
