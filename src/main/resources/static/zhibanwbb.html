<script type="text/html" id="barDemo">
  <a class="layui-btn layui-btn-normal layui-btn-xs" lay-event="checkDetal">查看详情</a>
  <!-- <a class="layui-btn layui-btn-primary layui-btn-xs" lay-event="daochu">导出详情</a> -->

<script type="text/javascript">
	
	$("#footer").load("public/footer.html");
	
	var table = layui.table;
	var laydate = layui.laydate;
	//常规用法
	  laydate.render({
	    elem: '#riqi'
	  });
	//日期范围
	  laydate.render({
	    elem: '#chooseTime'
	    ,range: true
	  });
	
	
	
	function getTabledata(url){
		// 获取头部数据
		table.render({
		  elem: '#djjdetail'
		  ,url:url
		  ,defaultToolbar: []
		  ,page:true
		  ,cols: [[
			 {field: '', title: '序号',width:60,templet: function(d){ return (d.LAY_INDEX); },align:"center"}
		    ,{field:'deptNme', title: '未报备单位', align:"center" }
		    ,{field:'total',title: '未报备次数',align:"center"}
			,{fixed: 'right', title:'操作', toolbar: '#barDemo',align:"center"  }
		  ]]
		});
	}
	
	function singldetail(url){
		table.render({
		  elem: '#singldetail'
		  ,url:url
		  ,defaultToolbar: []
		  ,page:true
		  ,cols: [[
			 {field: '', title: '序号',width:60,templet: function(d){ return (d.LAY_INDEX); },align:"center"}
		    ,{field:'deptName', title: '未报备单位', align:"center" }
		    ,{field:'zbdate',title: '未报值班时间',align:"center"}
		  ]]
		});
	}
	
	
	//#根据日期和deptId查看该单位未报备详情
	//GET http://localhost:8080/tzbwbz/queryTzbwbzByDateAndDept?startDate=2020-05-25&endDate=2020-05-29&deptId=D00003
	
	
	table.on('tool(djjdetail)', function(obj){
	    var data = obj.data;
	    if(obj.event === 'checkDetal'){
			console.log(data);
			var checkTime = $("#chooseTime").val();
			var startDate = checkTime.slice(0,10);
			var endDate = checkTime.slice(13);
			singldetail(baseUrl+"/tzbwbz/queryTzbwbzByDateAndDept?startDate="+startDate+"&endDate="+endDate+"&deptId="+data.deptId)
	    } 
	  });
	
	// 查询
	$("#chaxun").click(function(){
		var checkTime = $("#chooseTime").val();
		var startDate = checkTime.slice(0,10);
		var endDate = checkTime.slice(13);
		if(checkTime !=""){
			// GET http://localhost:8080/tzbwbz/queryTzbwbzSta?startDate=2020-05-25&endDate=2020-05-29
			var jiekou = baseUrl+"/tzbwbz/queryTzbwbzSta?startDate="+startDate+"&endDate="+endDate;
			getTabledata(jiekou);
		}else{
			layer.msg("您还没有选择时间！");
		}
		
	})
	
	
	
	$("#addbbdw").click(function(){
		layer.open({
		 type:1,
		 area:['800px','550px'],
		  title: '添加线路'
		  ,content: $("#addnew"),
		  shade: 0,
		  btn: ['提交', '取消']
		  ,btn1: function(index, layero){
			  var dataSend = {
				  "deptIds":$("#dwpz").val().toString(),
				  "zbdate":$("#riqi").val()
			  }
			  var load1 = layer.load(1);  
				$.ajax({
				    url:baseUrl + "/tzbwbz/addTzbwbz",
				    type:"post",
				    cache:false,
					data:JSON.stringify(dataSend),
					dataType : 'JSON',
					contentType: "application/json",
					beforeSend: function (XMLHttpRequest) {
					   XMLHttpRequest.setRequestHeader("token", token);
					},
				    success:function(data) {
						if(data.code==0){
							layer.close(load1);
						    layer.msg("添加成功");
							layer.closeAll();
							$("#addnew").hide();
							$('select[name="dwpz"]').val([]);
							layui.form.render();
						}else {
							layer.close(load1);
						    layer.msg(data.msg);
							$("#addnew").hide();
							$('select[name="dwpz"]').val([]);
							layui.form.render();
						}
				    },
				    error : function (res) {
						layer.closeAll();
				        layer.msg('添加失败');
						$("#addnew").hide();
						$('select[name="dwpz"]').val([]);
						layui.form.render();
				    }
				})
		  },
		  btn2: function(index, layero){
				layer.closeAll();
				layui.form.render("select");
				$("#addnew").hide();
				$('select[name="dwpz"]').val([]);
				layui.form.render();
		  },
		cancel: function(layero,index){ 
				layui.form.render("select")
			   layer.closeAll();
			   $("#addnew").hide();
			   $('select[name="dwpz"]').val([]);
			   layui.form.render();
		  }
		
		}); 
	})
	
	
	
	
	
</script>
