	function layuiSelect(selectID,url,value){
		$.get(url,function(data){
			if(selectID.indexOf("#")!=0){
				selectID="#"+selectID;
			}
			$(selectID).empty();
			for(var k in data.data){
				// console.log(k)
				$(selectID).append("<option  value='"+data.data[k]+"'>"+data.data[k]+"</option>");
			}
			if(value!=undefined||value!=null||value!=""){
				$(selectID).val(value);
			}
			// layui.form.render();
		})
	}
