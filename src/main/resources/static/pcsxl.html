		// 动态添加select下拉,带搜索
		function layuiSelect66(selectID,url,value){
			$.get(url,function(data){

				}
				$(selectID).empty();
				$(selectID).append("<option value='' >请选择</option>");
				for(var k of data.data){
					// console.log(k)
					$(selectID).append("<option value='"+k.V_RWSBId+"'>"+k.V_RWSBId+"("+ k.Brand+"/"+ k.BZs6 +"/"+ k.jrlx +"/"+ k.BZs4 +")</option>");
				}
				if(value!=undefined||value!=null||value!=""){
					$(selectID).val(value);
				}
				layui.form.render();

		//GET {{baseUrl}}/xlgl/querySbDkDetailBySbId?sbbh=V202001060001

		table.on('tool(showList)', function(obj){
			var data = obj.data;
			if(obj.event === 'duankoushu'){
				//$("input").val("");
				$("#searchBox").show();
				$("#removeBtn").show();
				$("#nameBox").show();
				$("input[name='dklx_0']").val("");

				$("#name1").html(data.所在位置);
				$("#name2").html(data.网络类型);
				$("#name3").html(data.设备类型);
				layui.form.render("select","newSelect");
				table.render({
				  elem: '#duankoushu'
				  ,page:true
				  ,url:baseUrl+"/xlgl/querySbDkDetailBySbId?sbbh="+data.设备编号
				  ,cols: [[
					{field: '', title: '序号',width:60,templet: function(d){ return (d.LAY_INDEX); },align:"center"}
					,{field:'dklx', title: '端口类型',}
					,{field:'bkh', title: '板卡号',}
					,{field:'起始端口号',  title: '起始端口号',}
					,{field:'端数量',  title: '端口数',}
				  ]]
				});	
				
				
				layer.open({
				 type:1,
				 area:['900px','650px'],
				  title: '添加端口'
				  ,content: $("#addnew"),
				  shade: 0,
				  btn: ['提交', '取消']
				  ,btn1: function(index, layero){
					  var datas = $("#addnew").serializeArray();
					  // console.log(datas);
					  if(datas[0].value==""){
						  layer.msg("您还没有填写设备编号!");
						  return false;
					  }
					  var dataSend=[];
					  var sbId = null;
					  //去取id
					  $.each(datas,function(i,k){
						  if(datas[i].name=="id"){
							  sbId=datas[i].value;
						  }
					  })
					  var temp ={};
					  $.each(datas,function(i,v){
						  // console.log(v);
						  if(v.name!="id"){
							   var column = v.name.split("_")[0];
							   var index = v.name.split("_")[1];
							   if(column =='dklx'){
								   temp.dklx = v.value;
							   }else if(column =='bkh'){
								   temp.bkh = v.value;
							   }else if(column =='dkh'){
								   temp.dks = v.value;
							   }else if(column =='qsh'){
								   temp.dkhqs = v.value;
								   temp.sbId = sbId;
								   dataSend.push(temp);
								   temp ={};
							   }
						  }
					  })
					  // console.log(dataSend);
					  var load1 = layer.load(1);  
						$.ajax({
						    url:baseUrl + "/xlgl/addDkBatch",
						    type:"post",
						    cache:false,
							data:JSON.stringify(dataSend),
							dataType : 'JSON',
							contentType: "application/json",
							beforeSend: function (XMLHttpRequest) {
							   XMLHttpRequest.setRequestHeader("token", token);
							},
						    success:function(data) {
								if(data.code==0){
									layer.close(load1);
								    layer.msg("添加成功");
									table.reload("testReload");
									//$("input").val("");
									$("#nameBox").hide();
								}else {
									layer.close(load1);
								    layer.msg(data.msg);
									$("#nameBox").hide();
								}
						    },
						    error : function (res) {
								layer.close(load1);
						        layer.msg('添加失败');
								$("#nameBox").hide();
						    }
						})
						layer.closeAll();
						$("#addnew").hide();
						$("#nameBox").hide();
						layui.form.render("select")
				  },
				  btn2: function(index, layero){
						layer.closeAll();
						$("#addnew").hide();
						$("#nameBox").hide();
						layui.form.render("select")
				  },
				cancel: function(layero,index){ 
						layui.form.render("select")
					   layer.closeAll();
					   $("#addnew").hide();
					   $("#nameBox").hide();
				  }
				
				}); 
				
			}else if(obj.event === 'xianlushu'){

					,{field:'slDklx',title: '上联端口',align:"center" ,templet:function(d){ return d.slDklx+"/"+d.slBkh+"/"+d.slDkh }}
					,{field:'slSbId',title: '上联设备编号', align:"center" ,style:'color: #083485;cursor: pointer;',event:'tipssl',}
					,{field:'xlDklx',title: '下联端口', align:"center" ,templet:function(d){ return d.xlDklx+"/"+d.xlBkh+"/"+d.xlDkh }}
					,{field:'xlSbId',title: '下联设备编号', align:"center",style:'color: #083485;cursor: pointer;',event:'tipsxl',}
