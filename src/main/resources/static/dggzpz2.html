	// 动态添加select下拉,带搜索
	function layuiSelect(selectID,url,value){
		$.get(url,function(data){
			if(selectID.indexOf("#")!=0){
				selectID="#"+selectID;
			}
			$(selectID).empty();
			// console.log(data)
			$(selectID).append("<option value='' >请选择</option>");
			for(var k of data.data){
				// console.log(k)
				$(selectID).append("<option value='"+k.deptId+"'>"+k.deptSName+"</option>");
			}
			if(value!=undefined||value!=null||value!=""){
				$(selectID).val(value);
			}
			layui.form.render();
			$.get(baseUrl+"/df/queryDfRule",function(res){
				if(res.data.deptIds==""||res.data.deptIds==null||res.data.deptIds==undefined){
					$('select[name="dwpz"]').val([]);
				}else{
					var deptArr = res.data.deptIds.split(",");
					$('select[name="dwpz"]').val(deptArr);
				}
				// 展示以添加项目
				$("#dfbt").val(res.data.title);
				$("#configid").val(res.data.id);
				layui.form.render();
			})
			
		})
	}
	// 调用该方法
	//layuiSelect("dwpz",baseUrl+"/df/queryAllDept");
