	<div class="zhibantable" style="margin-bottom: 100px;">
	    <fieldset class="layui-elem-field layui-field-title" style="margin-top: 25px;">
	        <legend>配置项目</legend>
	     </fieldset>  
		 <div class="layui-form">
				<div class="layui-block">
		         <label class="layui-form-label" style="width: auto;">单位</label>
		         <div class="layui-input-block">
		           <select name="danwei" id="danwei" lay-filter="change">
		 				  <!-- <option value="">请选择</option> -->
		                   <option value="0">指挥中心</option>
		 				  <option value="1">派出所自建</option>
		                   <option value="2">交警大队</option>
		                   <option value="3">教育监控</option>
		                   <option value="4">小区监控</option>

		 				  <option value="6">其他单位</option>
		            </select>
		         </div>
		       </div>
		       <div class="layui-block">
		         <label class="layui-form-label" style="width: auto;">项目名称</label>
		         <div class="layui-input-block">
					<select name="xmName" id="xmName" lay-filter="xmName">
							<!-- <option value="">请选择</option> -->
					        <option value="0">指挥中心</option>
							<option value="1">派出所自建</option>
					        <option value="2">交警大队</option>

							<option value="6">其他单位</option>

		         </div>
		       </div>
		 	 
		 </div>
