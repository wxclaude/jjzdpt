		 function layuiSelect(selectID,url,value){
		 	$.get(url,function(data){
		 		if(selectID.indexOf("#")!=0){
		 			selectID="#"+selectID;
		 		}
		 		$(selectID).empty();
		 		// console.log(data)

		 		for(var k of data.data){
		 			// console.log(k)
		 			$(selectID).append("<option value='"+k.deptId+"'>"+k.deptSName+"</option>");
		 		}
		 		if(value!=undefined||value!=null||value!=""){
		 			$(selectID).val(value);
		 		}
		 		layui.form.render();

		 }
